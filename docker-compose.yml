# Compose file targets Raspberry Pi 4 deployment. See ARCHITECTURE.md.

services:
  eink-frame:
    build: .
    image: eink-frame:latest
    container_name: eink-frame
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
      - ./credentials.json:/app/credentials.json:ro
